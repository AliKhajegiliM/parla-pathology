<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 88px Arial, Helvetica, sans-serif; fill: #0072B2; }
      .h1 { font: 700 38px Arial, Helvetica, sans-serif; fill: #111111; }
      .body { font: 400 22px Arial, Helvetica, sans-serif; fill: #555555; }
      .small { font: 700 16px Arial, Helvetica, sans-serif; }
      .step-title { font: 700 23px Arial, Helvetica, sans-serif; }
      .step-body { font: 400 17px Arial, Helvetica, sans-serif; }
      .metric { font: 700 39px Arial, Helvetica, sans-serif; fill: #111111; }
      .metric-label { font: 700 17px Arial, Helvetica, sans-serif; fill: #111111; }
      .metric-sublabel { font: 400 16px Arial, Helvetica, sans-serif; fill: #555555; }
      .footer { font: 700 19px Arial, Helvetica, sans-serif; fill: #111111; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#EEF2F5" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#F8FAFC"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="50" cy="865" r="210" fill="#EEF1F4"/>
  <text x="82" y="148" style="font:700 104px Arial, Helvetica, sans-serif; fill:#0072B2;">PaRLA</text>
  <text x="84" y="224" style="font:700 40px Arial, Helvetica, sans-serif; fill:#111111;">LoRA Llama-70B for clinical pathology abstraction</text>
  <text x="86" y="258" class="body">Extracts biomarkers, molecular findings, staging/prognostic variables, treatment effect,</text>
  <text x="86" y="286" class="body">and uncertainty from pathology report text.</text>
  <g>
    <rect x="82" y="315" width="250" height="35" rx="17" fill="#E7F3FA" stroke="#DDE4EA"/><text x="100" y="338" class="small" fill="#005E93">24,370 adapted SFT examples</text>
    <rect x="344" y="315" width="224" height="35" rx="17" fill="#F3F5F7" stroke="#DDE4EA"/><text x="362" y="338" class="small" fill="#555555">TCGA external validation</text>
  </g>
  <rect x="115" y="450" width="245" height="104" rx="24" fill="#FFFFFF" stroke="#C9C9C9" stroke-width="3"/>
  <text x="137" y="492" class="step-title" fill="#111111">HISTAI</text>
  <text x="137" y="528" class="step-body" fill="#555555">digital pathology text</text>
  <text x="368" y="510" style="font:700 25px Arial, Helvetica, sans-serif; fill:#0072B2;">→</text>
  <rect x="394" y="450" width="245" height="104" rx="24" fill="#FFFFFF" stroke="#0072B2" stroke-width="3"/>
  <image href="data:image/png;base64," x="414" y="474" width="34" height="34" preserveAspectRatio="xMidYMid meet"/>
  <text x="458" y="492" class="step-title" fill="#111111">Adaptive Data</text>
  <text x="458" y="528" class="step-body" fill="#555555">targeted SFT examples</text>
  <text x="647" y="510" style="font:700 25px Arial, Helvetica, sans-serif; fill:#0072B2;">→</text>
  <rect x="673" y="450" width="245" height="104" rx="24" fill="#FFFFFF" stroke="#0072B2" stroke-width="3"/>
  <text x="695" y="492" class="step-title" fill="#111111">AutoScientist</text>
  <text x="695" y="528" class="step-body" fill="#555555">LoRA fine-tuning loop</text>
  <text x="926" y="510" style="font:700 25px Arial, Helvetica, sans-serif; fill:#0072B2;">→</text>
  <rect x="952" y="450" width="245" height="104" rx="24" fill="#FFFFFF" stroke="#0072B2" stroke-width="3"/>
  <text x="974" y="492" class="step-title" fill="#111111">PaRLA</text>
  <text x="974" y="528" class="step-body" fill="#555555">clinical-pathology extractor</text>
  <text x="1205" y="510" style="font:700 25px Arial, Helvetica, sans-serif; fill:#0072B2;">→</text>
  <rect x="1231" y="450" width="245" height="104" rx="24" fill="#FFFFFF" stroke="#C9C9C9" stroke-width="3"/>
  <text x="1253" y="492" class="step-title" fill="#111111">Validation</text>
  <text x="1253" y="528" class="step-body" fill="#555555">internal + TCGA external</text>
  <rect x="82" y="625" width="330" height="148" rx="22" fill="#FFFFFF" stroke="#DDE4EA" stroke-width="2"/>
  <rect x="82" y="625" width="9" height="148" rx="8" fill="#0072B2"/>
  <text x="247" y="688" class="metric" text-anchor="middle">86%</text>
  <text x="247" y="730" class="metric-label" text-anchor="middle">Internal validation win rate</text>
  <text x="247" y="756" class="metric-sublabel" text-anchor="middle">vs. base Llama 70B</text>
  <rect x="440" y="625" width="330" height="148" rx="22" fill="#FFFFFF" stroke="#DDE4EA" stroke-width="2"/>
  <rect x="440" y="625" width="9" height="148" rx="8" fill="#0072B2"/>
  <text x="605" y="688" class="metric" text-anchor="middle">83.8%</text>
  <text x="605" y="730" class="metric-label" text-anchor="middle">External validation win rate</text>
  <text x="605" y="756" class="metric-sublabel" text-anchor="middle">vs. base Llama 70B, n = 500</text>
  <rect x="798" y="625" width="330" height="148" rx="22" fill="#FFFFFF" stroke="#DDE4EA" stroke-width="2"/>
  <rect x="798" y="625" width="9" height="148" rx="8" fill="#0072B2"/>
  <text x="963" y="688" class="metric" text-anchor="middle">32 / 92</text>
  <text x="963" y="730" class="metric-label" text-anchor="middle">Cohorts / cleaned centers</text>
  <text x="963" y="756" class="metric-sublabel" text-anchor="middle">TCGA external validation</text>
  <rect x="1156" y="625" width="330" height="148" rx="22" fill="#FFFFFF" stroke="#DDE4EA" stroke-width="2"/>
  <rect x="1156" y="625" width="9" height="148" rx="8" fill="#0072B2"/>
  <text x="1321" y="688" class="metric" text-anchor="middle">+1.8–5.2</text>
  <text x="1321" y="730" class="metric-label" text-anchor="middle">C-index gain vs. full report</text>
  <text x="1321" y="756" class="metric-sublabel" text-anchor="middle">survival benchmark, n = 2,819</text>
  <rect x="84" y="812" width="1432" height="48" rx="24" fill="#FFFFFF" stroke="#DDE4EA"/>
  <text x="112" y="843" class="footer">Train: HISTAI originally digital reports  →  Adapt: Adaptive Data + AutoScientist LoRA  →  Validate: internal held-out + external TCGA reports</text>
</svg>
