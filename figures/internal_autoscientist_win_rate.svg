<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #111111; }
    .muted { fill: #555555; }
    .grid { stroke: #D9D9D9; stroke-width: 3; }
    .axis { stroke: #222222; stroke-width: 5; }
  </style>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <text x="900" y="110" text-anchor="middle" font-size="60" font-weight="700">Internal held-out win rate</text>
  <text x="900" y="175" text-anchor="middle" font-size="34" class="muted">AutoScientist internal evaluation · HISTAI-derived held-out test set</text>

  <line x1="230" y1="250" x2="1640" y2="250" class="grid"/>
  <line x1="230" y1="405" x2="1640" y2="405" class="grid"/>
  <line x1="230" y1="560" x2="1640" y2="560" class="grid"/>
  <line x1="230" y1="715" x2="1640" y2="715" class="grid"/>
  <line x1="230" y1="870" x2="1640" y2="870" class="grid"/>

  <line x1="230" y1="250" x2="230" y2="870" class="axis"/>
  <line x1="230" y1="870" x2="1640" y2="870" class="axis"/>

  <text x="205" y="880" text-anchor="end" font-size="32">0</text>
  <text x="205" y="725" text-anchor="end" font-size="32">25</text>
  <text x="205" y="570" text-anchor="end" font-size="32">50</text>
  <text x="205" y="415" text-anchor="end" font-size="32">75</text>
  <text x="205" y="260" text-anchor="end" font-size="32">100</text>
  <text x="75" y="560" text-anchor="middle" font-size="36" transform="rotate(-90 75 560)">Win rate (%)</text>

  <rect x="500" y="783.2" width="260" height="86.8" fill="#C9C9C9"/>
  <rect x="1040" y="336.8" width="260" height="533.2" fill="#0072B2"/>

  <text x="630" y="752" text-anchor="middle" font-size="48" font-weight="700">14%</text>
  <text x="1170" y="306" text-anchor="middle" font-size="48" font-weight="700">86%</text>

  <text x="630" y="940" text-anchor="middle" font-size="40">Base</text>
  <text x="1170" y="940" text-anchor="middle" font-size="40">Adapted PaRLA</text>
</svg>
